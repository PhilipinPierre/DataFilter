name: .NET Build and Test

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.x
          9.x

    - name: Restore dependencies
      run: dotnet restore DataFilter.slnx --ignore-failed-sources

    - name: Build
      run: dotnet build DataFilter.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test DataFilter.slnx --configuration Release --no-build --verbosity normal
