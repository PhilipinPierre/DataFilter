name: .NET Build, Test and Publish

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      id-token: write   # Obligatoire pour le Trusted Publishing
      contents: read    # Obligatoire pour checkout

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore DataFilter.slnx

    - name: Restore workloads (MAUI/Blazor)
      run: dotnet workload restore DataFilter.slnx

    - name: Get Version from Tag
      shell: pwsh
      id: get_version
      run: |
        $tag = "${{ github.ref_name }}"
        if ("${{ github.ref_type }}" -eq "tag" -and $tag -match "^v") {
          $version = $tag.TrimStart('v')
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
        } else {
          $version = "1.0.0-build.$($env:GITHUB_RUN_NUMBER)"
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
        }

    - name: Build
      # Don't use --no-restore: some projects require RID-specific runtime packs (eg browser-wasm, win-x64).
      run: dotnet build DataFilter.slnx --configuration Release -p:Version=${{ env.VERSION }}

    - name: Install Playwright browsers (Chromium)
      shell: pwsh
      run: |
        dotnet build "demo/DataFilter.Blazor.Demo.PlaywrightTests/DataFilter.Blazor.Demo.PlaywrightTests.csproj" --configuration Release
        pwsh "demo/DataFilter.Blazor.Demo.PlaywrightTests/bin/Release/net8.0/playwright.ps1" install chromium

    - name: Test
      env:
        DF_DEMO_HOST: server
      # UIContracts.* suites require interactive sessions / external infrastructure.
      # Keep them in their dedicated jobs, otherwise hosted runners (and act) can be flaky/fail.
      run: dotnet test DataFilter.slnx --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName!~UIContracts."

    # NOTE: Desktop UI Automation (FlaUI) requires an interactive Windows session.
    # GitHub-hosted runners often block UIA/SendInput interactions (timeouts / access denied).
    # Run these on a self-hosted Windows runner (see `desktop-ui-contracts` job below).

    - name: Pack
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet pack DataFilter.slnx --configuration Release --no-restore --output ./artifacts -p:Version=${{ env.VERSION }} -p:PackageVersion=${{ env.VERSION }}

    - name: Publish to NuGet.org
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        dotnet nuget push artifacts\*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ secrets.DataFilter_NuGet_API_Key }}

  ui-blazor-playwright:
    runs-on: windows-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        demo_host: [server, wasm]
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore DataFilter.slnx

    - name: Build Playwright tests
      run: dotnet build "demo/DataFilter.Blazor.Demo.PlaywrightTests/DataFilter.Blazor.Demo.PlaywrightTests.csproj" --configuration Release

    - name: Install Playwright browsers (Chromium)
      shell: pwsh
      run: pwsh "demo/DataFilter.Blazor.Demo.PlaywrightTests/bin/Release/net8.0/playwright.ps1" install chromium

    - name: Playwright UI contracts (${{ matrix.demo_host }})
      env:
        DF_DEMO_HOST: ${{ matrix.demo_host }}
      run: dotnet test "demo/DataFilter.Blazor.Demo.PlaywrightTests/DataFilter.Blazor.Demo.PlaywrightTests.csproj" --configuration Release --no-build --verbosity normal

  # Requires a self-hosted Windows runner with an interactive session (UIA/SendInput).
  # Label the runner: self-hosted, Windows, X64. See tests/UI.ContractTesting.md.
  desktop-ui-contracts:
    runs-on: [self-hosted, Windows, X64]
    needs: build
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore DataFilter.slnx

    - name: Build (Release)
      run: dotnet build DataFilter.slnx --configuration Release -p:Platform=x64

    - name: Build demo apps for FlaUI
      run: |
        dotnet build "demo/DataFilter.Wpf.Demo/DataFilter.Wpf.Demo.csproj" -c Release
        dotnet build "demo/DataFilter.WinForms.Demo/DataFilter.WinForms.Demo.csproj" -c Release
        dotnet build "demo/DataFilter.WinUI3.Demo/DataFilter.WinUI3.Demo.csproj" -c Release -p:Platform=x64

    - name: Desktop UI Contracts (FlaUI)
      run: dotnet test "tests/UIContracts.FlaUI.Tests/UIContracts.FlaUI.Tests.csproj" --configuration Release --no-build --verbosity normal

  ui-maui-appium:
    runs-on: macos-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Restore workloads (MAUI)
      run: dotnet workload restore DataFilter.slnx

    - name: Build MAUI demo (${{ matrix.platform }})
      run: |
        if [ "${{ matrix.platform }}" = "android" ]; then
          dotnet publish demo/DataFilter.Demo.Maui/DataFilter.Maui.Demo.csproj -c Release -f net9.0-android -p:AndroidPackageFormat=apk
        else
          dotnet publish demo/DataFilter.Demo.Maui/DataFilter.Maui.Demo.csproj -c Release -f net9.0-ios -p:RuntimeIdentifier=iossimulator-x64
        fi

    - name: MAUI UI contracts (Appium, ${{ matrix.platform }})
      continue-on-error: true
      env:
        UICT_APP_PLATFORM: ${{ matrix.platform }}
        UICT_APPIUM_SERVER: http://127.0.0.1:4723/
        UICT_APP_PATH: ${{ matrix.platform == 'android' && 'demo/DataFilter.Demo.Maui/bin/Release/net9.0-android/publish/*.apk' || 'demo/DataFilter.Demo.Maui/bin/Release/net9.0-ios/iossimulator-x64/publish/*.app' }}
      run: dotnet test "tests/UIContracts.Appium.Tests/UIContracts.Appium.Tests.csproj" --configuration Release --verbosity normal
